<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Black Bull VITALIK">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#2a220e"/>
      <stop offset="60%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="6" y1="4" x2="27" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff4b8"/>
      <stop offset="45%" stop-color="#d6a72c"/>
      <stop offset="100%" stop-color="#7d5100"/>
    </linearGradient>
  </defs>

  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="url(#gold)" stroke-width="2"/>

  <!-- bull horns -->
  <path d="M9.3 11.1C5.5 9.2 4.2 5.8 4.3 3.5c2.9 1.1 5.4 3.3 7 6.5z"
        fill="none" stroke="url(#gold)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22.7 11.1c3.8-1.9 5.1-5.3 5-7.6-2.9 1.1-5.4 3.3-7 6.5z"
        fill="none" stroke="url(#gold)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- face shield -->
  <path d="M9.7 13.2c1.7-2.2 3.7-3.1 6.3-3.1s4.6.9 6.3 3.1c-.1 5.6-2.1 9.8-6.3 12.3-4.2-2.5-6.2-6.7-6.3-12.3z"
        fill="#111111" stroke="url(#gold)" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="13.2" cy="15.9" r="1.1" fill="#f7d56a"/>
  <circle cx="18.8" cy="15.9" r="1.1" fill="#f7d56a"/>

  <!-- V -->
  <path d="M12.4 18.7l3.6 5.1 3.6-5.1" fill="none" stroke="#fff0a3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- small ethereum diamond -->
  <path d="M16 6.5l2.1 3.1L16 11.1l-2.1-1.5z" fill="#f7d56a" opacity="0.9"/>
</svg>
